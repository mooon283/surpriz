<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənin Üçün Sürpriz</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #0b0000; /* Qara-tünd qırmızı fon */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Şifrə Giriş Ekranı */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #200000 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        #login-screen h2 {
            color: #ff3344;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 51, 68, 0.5);
            text-align: center;
            padding: 0 15px;
        }

        #password-input {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ff3344;
            border-radius: 25px;
            background: transparent;
            color: white;
            outline: none;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 51, 68, 0.2);
        }

        #login-btn {
            padding: 10px 30px;
            font-size: 16px;
            background-color: #ff3344;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 51, 68, 0.4);
            transition: 0.3s;
        }

        #login-btn:hover {
            background-color: #cc1122;
            transform: scale(1.05);
        }

        /* Əsas Sayt Məzmunu */
        #main-content {
            display: none;
            text-align: center;
            z-index: 2;
            max-width: 600px;
            padding: 20px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .romantic-text {
            font-size: 32px;
            color: #ff4d6d;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        /* Sənin istədiyin şeir */
        .poem-text {
            font-size: 22px;
            color: #ffb3c1;
            margin-top: 20px;
            line-height: 1.6;
            font-style: italic;
            text-shadow: 0 0 5px rgba(255, 179, 193, 0.4);
        }

        /* Şəkil (Hələlik gizlidir) */
        .love-image {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff4d6d;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.7);
            margin: 0 auto 10px auto;
        }

        /* YouTube pleyerini tamamilə gizlədirik ki, ancaq səs gəlsin */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* Axan Qırmızı Ürəklər */
        .heart {
            position: absolute;
            color: #ff3344;
            font-size: 20px;
            top: -10%;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                top: 110%;
                transform: translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Giriş üçün gizli şifrəni yaz:</h2>
        <input type="password" id="password-input" placeholder="Şifrə...">
        <button id="login-btn" onclick="checkPassword()">Aç</button>
    </div>

    <div id="main-content">
        <img src="sevgilim.jpg" alt="Bizim Şəkil" class="love-image" id="love-img" onerror="this.style.display='none';">
        
        <div class="romantic-text">Səni Sevirəm! ❤️</div>
        
        <div class="poem-text">
            Mən qala bilmərəm səndən aralı,<br>
            Mənim ürəyimin parası sənsən.<br>
            Mən yaşadıqca qal yanımda,<br>
            Mən öləndə çıxıb gedərsən..
        </div>

        <iframe id="youtube-player" src="https://www.youtube.com/embed/ZLp5dzy9Coo?enablejsapi=1" allow="autoplay"></iframe>
    </div>

    <script>
        const GIZLI_SIFRE = "14"; 

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === GIZLI_SIFRE) {
                document.getElementById('login-screen').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const mainContent = document.getElementById('main-content');
                    mainContent.style.display = 'block';
                    setTimeout(() => mainContent.style.opacity = 1, 50);
                    
                    // Düyməyə basan kimi YouTube videosunu arxa fonda başladırıq
                    const player = document.getElementById('youtube-player');
                    player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    
                    // Ürəklər axmağa başlayır
                    setInterval(createHeart, 300);
                }, 1000);
            } else {
                alert("Yalnış şifrə! Yenidən yoxla mənərim. ❤️");
            }
        }

        // Ürək yağışı
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
